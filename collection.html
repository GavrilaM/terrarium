<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Terrarium Collection — View all species you've collected.">
    <title>📚 Terrarium — All Species</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #020a18;
            color: #e4f0ff;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            padding: 40px 24px 60px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(224, 64, 251, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(124, 77, 255, 0.04) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }
        @keyframes bgPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* Nav */
        .top-nav {
            width: 100%; max-width: 1100px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 48px;
        }

        .nav-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px;
            background: rgba(10, 30, 61, 0.6);
            border: 1px solid rgba(80, 160, 255, 0.12);
            border-radius: 10px;
            color: #00e5ff;
            font-family: 'Outfit', sans-serif;
            font-size: 13px; font-weight: 500;
            text-decoration: none; cursor: pointer;
            transition: all 250ms ease;
        }
        .nav-btn:hover {
            background: rgba(15, 40, 80, 0.7);
            border-color: #00e5ff;
            box-shadow: 0 0 16px rgba(0, 229, 255, 0.15);
            transform: translateY(-1px);
        }

        .nav-logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: rgba(228, 240, 255, 0.5); }
        .nav-logo span:first-child { font-size: 20px; }

        /* Header */
        .page-header { text-align: center; margin-bottom: 40px; }

        .page-header h1 {
            font-size: 38px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px;
            background: linear-gradient(135deg, #e040fb, #7c4dff, #e040fb);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
            margin-bottom: 8px;
        }
        @keyframes shimmer { 0%, 100% { background-position: 0% center; } 50% { background-position: 200% center; } }

        .page-header p { font-size: 14px; color: #8baac8; font-weight: 300; }

        .collection-count {
            display: inline-block; margin-top: 12px;
            font-family: 'JetBrains Mono', monospace; font-size: 13px;
            padding: 6px 16px; border-radius: 20px;
            background: rgba(224, 64, 251, 0.1); border: 1px solid rgba(224, 64, 251, 0.2);
            color: #e040fb;
        }

        /* Tier sections */
        .tier-section { width: 100%; max-width: 1100px; margin-bottom: 40px; }

        .tier-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .tier-dot {
            width: 12px; height: 12px; border-radius: 50%;
        }
        .tier-dot.common { background: #9e9e9e; }
        .tier-dot.rare { background: #448aff; box-shadow: 0 0 8px rgba(68, 138, 255, 0.4); }
        .tier-dot.legendary { background: #ffd740; box-shadow: 0 0 8px rgba(255, 215, 64, 0.4); }

        .tier-label {
            font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
        }
        .tier-label.common { color: #9e9e9e; }
        .tier-label.rare { color: #448aff; }
        .tier-label.legendary { color: #ffd740; }

        /* Species grid */
        .species-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .species-card {
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(10, 30, 61, 0.35);
            padding: 20px;
            display: flex; align-items: flex-start; gap: 14px;
            transition: all 250ms ease;
            position: relative;
            overflow: hidden;
        }

        .species-card:hover { transform: translateY(-3px); }

        .species-card.locked {
            opacity: 0.35;
            filter: grayscale(0.6);
        }

        .species-card.unlocked {
            border-color: rgba(105, 240, 174, 0.15);
        }

        .species-card.unlocked::before {
            content: '✓';
            position: absolute; top: 8px; right: 10px;
            font-size: 11px; font-weight: 700;
            color: #69f0ae;
            background: rgba(105, 240, 174, 0.12);
            padding: 2px 8px; border-radius: 6px;
        }

        .species-emoji {
            font-size: 36px; flex-shrink: 0;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
        }

        .species-card.locked .species-emoji { filter: grayscale(1) brightness(0.5); }

        .species-info { flex: 1; }

        .species-name-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 4px;
        }

        .species-card-name {
            font-size: 15px; font-weight: 700; color: #e4f0ff;
        }

        .species-card.locked .species-card-name { color: #4a6a8a; }

        .species-diet {
            font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
            padding: 2px 6px; border-radius: 4px;
        }
        .diet-herbivore { background: rgba(76, 175, 80, 0.15); color: #66bb6a; }
        .diet-carnivore { background: rgba(244, 67, 54, 0.15); color: #ef5350; }
        .diet-omnivore { background: rgba(33, 150, 243, 0.15); color: #42a5f5; }

        .species-card-desc {
            font-size: 11px; color: #6a8aaa; line-height: 1.5;
        }

        .species-card.locked .species-card-desc { color: #3a5a7a; }

        .lock-icon {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px; opacity: 0.4;
            display: none;
        }
        .species-card.locked .lock-icon { display: block; }

        /* Default species section */
        .default-badge {
            font-size: 9px; font-weight: 600;
            padding: 2px 6px; border-radius: 4px;
            background: rgba(0, 229, 255, 0.1); color: #00e5ff;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 48px 24px;
            color: #4a6a8a; font-size: 14px;
        }
        .empty-state .emoji { font-size: 48px; margin-bottom: 12px; display: block; }

        /* Responsive */
        @media (max-width: 768px) {
            .species-grid { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="marketplace.html" class="nav-btn">
            ← Back to Marketplace
        </a>
        <div class="nav-logo">
            <span>🌿</span>
            <span>Terrarium</span>
        </div>
    </nav>

    <div class="page-header">
        <h1>📚 All Species</h1>
        <p>Your complete species collection</p>
        <div class="collection-count" id="collection-count">Loading...</div>
    </div>

    <!-- Default Species -->
    <div class="tier-section">
        <div class="tier-header">
            <div class="tier-dot" style="background:#00e5ff; box-shadow:0 0 8px rgba(0,229,255,0.4);"></div>
            <span class="tier-label" style="color:#00e5ff;">Default Species</span>
            <span class="default-badge">Free</span>
        </div>
        <div class="species-grid" id="default-grid"></div>
    </div>

    <!-- Common Species -->
    <div class="tier-section">
        <div class="tier-header">
            <div class="tier-dot common"></div>
            <span class="tier-label common">Common</span>
        </div>
        <div class="species-grid" id="common-grid"></div>
    </div>

    <!-- Rare Species -->
    <div class="tier-section">
        <div class="tier-header">
            <div class="tier-dot rare"></div>
            <span class="tier-label rare">Rare</span>
        </div>
        <div class="species-grid" id="rare-grid"></div>
    </div>

    <!-- Legendary Species -->
    <div class="tier-section">
        <div class="tier-header">
            <div class="tier-dot legendary"></div>
            <span class="tier-label legendary">Legendary</span>
        </div>
        <div class="species-grid" id="legendary-grid"></div>
    </div>

    <script type="module">
        import { GACHA_SPECIES } from './js/gacha.js';

        // Default species (always unlocked)
        const DEFAULT_SPECIES = [
            { id: 'florae', name: 'Florae', emoji: '🌿', diet: 'herbivore', description: 'Peaceful herbivores that flock together' },
            { id: 'predaxi', name: 'Predaxi', emoji: '🔴', diet: 'carnivore', description: 'Aggressive carnivore hunters' },
            { id: 'mixolith', name: 'Mixolith', emoji: '🔵', diet: 'omnivore', description: 'Adaptive omnivore explorers' },
        ];

        // Get collected species
        const collection = JSON.parse(localStorage.getItem('terrarium_gacha_collection') || '[]');
        const collectedIds = new Set(collection.map(c => c.speciesId));

        // Count unlocked
        const gachaSpecies = Object.values(GACHA_SPECIES);
        const unlockedCount = gachaSpecies.filter(s => collectedIds.has(s.id)).length;
        const totalCount = gachaSpecies.length;

        document.getElementById('collection-count').textContent =
            `${3 + unlockedCount} / ${3 + totalCount} species collected`;

        // Render default species
        const defaultGrid = document.getElementById('default-grid');
        DEFAULT_SPECIES.forEach(sp => {
            defaultGrid.innerHTML += createCard(sp, true);
        });

        // Render gacha species by tier
        const tiers = ['common', 'rare', 'legendary'];
        tiers.forEach(tier => {
            const grid = document.getElementById(`${tier}-grid`);
            const species = gachaSpecies.filter(s => s.tier === tier);
            species.forEach(sp => {
                const unlocked = collectedIds.has(sp.id);
                grid.innerHTML += createCard(sp, unlocked);
            });
        });

        function createCard(sp, unlocked) {
            return `
                <div class="species-card ${unlocked ? 'unlocked' : 'locked'}">
                    <span class="species-emoji">${sp.emoji}</span>
                    <div class="species-info">
                        <div class="species-name-row">
                            <span class="species-card-name">${unlocked ? sp.name : '???'}</span>
                            <span class="species-diet diet-${sp.diet}">${sp.diet}</span>
                        </div>
                        <div class="species-card-desc">${unlocked ? sp.description : 'Pull from gacha to unlock this species'}</div>
                    </div>
                    <span class="lock-icon">🔒</span>
                </div>
            `;
        }
    </script>

</body>
</html>
